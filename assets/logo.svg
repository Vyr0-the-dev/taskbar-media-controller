<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="glow" x1="64" y1="30" x2="64" y2="98" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="32" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="125" height="125" rx="30.5" stroke="#27272a" stroke-width="1"/>

  <!-- Glow effect -->
  <ellipse cx="64" cy="64" rx="40" ry="40" fill="url(#glow)"/>

  <!-- Music note - modern design -->
  <g transform="translate(36, 28)">
    <!-- Note stem -->
    <path d="M20 8 L20 56" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M36 4 L36 48" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Note beam -->
    <path d="M20 8 L36 4" stroke="url(#accent)" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Note heads -->
    <ellipse cx="14" cy="58" rx="9" ry="7" fill="url(#accent)"/>
    <ellipse cx="30" cy="50" rx="9" ry="7" fill="url(#accent)"/>
  </g>

  <!-- Taskbar element -->
  <g transform="translate(24, 88)">
    <rect width="80" height="6" rx="3" fill="#27272a"/>
    <rect width="52" height="6" rx="3" fill="url(#accent)"/>
    <circle cx="52" cy="3" r="4" fill="url(#accent)"/>
    <circle cx="52" cy="3" r="4" fill="#10b981" opacity="0.6"/>
  </g>

  <!-- Subtle border highlight -->
  <rect x="3" y="3" width="122" height="122" rx="29" stroke="#3f3f46" stroke-width="0.5" opacity="0.3"/>
</svg>